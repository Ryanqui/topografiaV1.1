<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b2a4a" />
  <meta name="description"
    content="Aplicativo académico de topografía y taquimetría para estudiantes de ingeniería civil. Cálculos de cinta, brújula, poligonal, nivelación, taquimetría, estación total, perfil y replanteo." />
  <title>Practicas de Topografia</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="app" class="app shell-loading">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark"><img src="assets/logo.svg" alt="Logo Practicas de Topografia"></div>
        <div>
          <h1>Practicas de Topografia</h1>
          <p>Jesus Alfonso Barrante Flores</p>
        </div>
      </div>
      <nav id="moduleNav" class="module-nav" aria-label="Módulos"></nav>
      <div class="sidebar-footer">
        <button id="themeToggle" class="btn ghost" type="button">🌗 Tema</button>
        <button id="installBtn" class="btn ghost hidden" type="button">⬇ Instalar</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button id="menuToggle" class="icon-btn" type="button" aria-label="Abrir menú">☰</button>
        <div class="top-title">
          <strong id="activeProjectName">Sin proyecto activo</strong>
          <span id="saveStatus">Listo</span>
        </div>
        <div class="top-actions">
          <select id="projectSelect" title="Seleccionar proyecto"></select>
          <button id="newProjectBtn" class="btn primary" type="button">+ Proyecto</button>
          <button id="saveBtn" class="btn" type="button">Guardar</button>
        </div>
      </header>

      <section class="notice">
        <strong>Nota técnica:</strong> Las fórmulas son académicas y verificables. Las tolerancias, precisiones y
        criterios de aceptación deben validarse con la normativa peruana aplicable, expediente técnico y
        especificaciones del proyecto.
      </section>

      <section id="content" class="content" aria-live="polite"></section>
    </main>
  </div>

  <input id="fileInput" type="file" class="hidden" />
  <script src="app.js"></script>
</body>

</html>
